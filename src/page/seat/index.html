<!doctype html>
<html lang="ko-KR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>seatPage</title>
  <link rel="stylesheet" href="/src/page/seat/seatStyle.css" />
  <link rel="stylesheet" href="/src/style/index.css" />
  <link rel="stylesheet" href="/src/style/a11y.css" />
  <script src="/src/page/seat/seatJs.js" type="module"></script>
</head>

<body class="app">
  <main class="container">
    <div class="seat-component" role="region" aria-labelledby="seat-section">
      <!-- seat select-->
      <h2 id="seat-section">좌석 선택</h2>

      <!-- title screen -->
      <span class="title-screen" role="heading"> SCREEN </span>

      <!-- seat area (A~J 124석 배열) -->
      <div class="seat-area"></div>
    </div>

    <!-- seat icon-list -->
    <ul class="icon-list">
      <li class="list-item">
        <span class="icon-special"></span>
        <span class="label">장애인석</span>
      </li>
      <li class="list-item">
        <span class="icon-door"></span>
        <span class="label">출입문</span>
      </li>
    </ul>

    <!-- movie title -->
    <h3>왕과 사는 남자(2D)</h3>
    <!-- selected info -->
    <div class="selected-info" role="region" aria-labelledby="selected-info-title">
      <h4 id="selected-info" class="sr-only">선택된 예매 정보</h4>
      <ul class="info-list">
        <li class="info-item">
          <span class="label">좌석</span>
          <span id="selected-seats">좌석을 선택해주세요</span>
        </li>
        <li class="info-item">
          <span class="label">인원</span>
          <span id="person-count">성인 0</span>
          <button type="button" class="change" aria-label="인원 변경하기">인원변경</button>
        </li>
      </ul>
    </div>
  </main>
</body>

</html>
