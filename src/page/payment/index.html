<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="예매의 정석 사이트 결제 페이지" />
    <title>영화 티켓 결제 페이지</title>
    <link rel="stylesheet" href="/src/style/index.css" />
    <link rel="stylesheet" href="/src/page/payment/paymentComponent.css" />
  </head>
  <body class="app">
    <h1 class="sr-only">영화 예매 티켓 결제 페이지</h1>
    <a href="#main-content" class="sr-only focusable-main">본문 바로가기</a>
    <main class="container">
      <section class="movie-ticket-payment-info">
        <h2 class="sr-only">영화 예매 티켓 정보</h2>
        <div class="img-container">
          <img
            class="movie-img"
            width="100"
            height="130"
            src="/src/page/payment/dummyImg.jpg"
            alt="영화 포스터"
          />
          <svg
            class="movie-age-rating"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 64 64"
            width="25"
            height="25"
            aria-hidden="true"
          >
            <rect x="8" y="8" width="48" height="48" rx="6" fill="#E8844D" />
            <text
              x="32"
              y="36"
              font-family="Arial, sans-serif"
              font-size="44"
              font-weight="bold"
              fill="white"
              text-anchor="middle"
              dominant-baseline="middle"
            >
              15
            </text>
          </svg>
        </div>
        <div class="info-text-part">
          <h2 class="movie-title">이터널 선샤인</h2>
          <ul class="js-component movie-info">
            <li><time datetime="2026-02-10T21:15">2026-02-10 (화) 21:15</time> ~ 23:12</li>
            <li>건대입구 7관, 수퍼LED(일반) - 2D</li>
            <li><strong>성인1</strong></li>
          </ul>
        </div>
      </section>

      <section class="payment-discount">
        <h2 class="discount-part-heading">할인/포인트</h2>
        <div class="lion-point">
          <div class="point-tab">
            <ul>
              <li>
                <!-- role tab -->
                <!-- aria-controls 추가 -->
                <button
                  class="lion-point-button"
                  type="button"
                  aria-selected="false"
                  aria-label="lion-POINT로 조회 및 적립"
                >
                  Lion-POINT 조회
                </button>
              </li>
              <li>
                <button
                  class="lion-point-button"
                  type="button"
                  aria-selected="false"
                  aria-label="lion-POINT 카드 번호로 적립"
                >
                  Lion-POINT 카드 번호
                </button>
              </li>
            </ul>
          </div>
        </div>
        <div class="coupon-discount-method">
          <div class="discount-method-tab">
            <ul class="coupon-list">
              <li class="coupon-list-item" id="point-vip">
                <button class="vip-button" aria-pressed="false" aria-label="VIP 적립" type="button">
                  VIP
                </button>
              </li>
              <li class="coupon-list-item" id="point-admission">
                <button
                  class="admission-button"
                  aria-selected="false"
                  aria-label="관람권 적립"
                  type="button"
                >
                  관람권
                </button>
              </li>
              <li class="coupon-list-item" id="point-discount">
                <button
                  class="point-button"
                  aria-selected="false"
                  aria-label="할인권 적립"
                  type="button"
                >
                  할인권
                </button>
              </li>
              <li class="coupon-list-item" id="point-etc">
                <button
                  class="point_etc-button"
                  aria-selected="false"
                  aria-label="기타 포인트 적립"
                  type="button"
                >
                  제휴포인트/할인
                </button>
              </li>
            </ul>
          </div>
        </div>
      </section>

      <section class="final-payment">
        <h2>최종 결제수단</h2>
        <div class="final-payment-methods">
          <button
            type="button"
            class="credit-card active"
            aria-pressed="false"
            aria-label="최종 결제 수단 신용카드 선택"
          >
            <!-- 신용카드 -->
            <svg
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <rect x="2" y="5" width="20" height="14" rx="2" stroke="black" stroke-width="1.5" />
              <line x1="2" y1="10" x2="22" y2="10" stroke="black" stroke-width="1.5" />
            </svg>
            <!-- 텍스트 -->
            신용카드
          </button>

          <!-- 엘포인트  -->
          <button
            type="button"
            class="lionpoint"
            aria-pressed="false"
            aria-label="최종 결제 수단 라이온 포인트 선택"
          >
            <svg
              width="50"
              height="40"
              viewBox="0 0 40 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <rect x="2" y="10" width="36" height="20" rx="4" stroke="#FF6000" stroke-width="2" />
              <text
                x="20"
                y="24"
                fill="#FF6000"
                font-family="Arial, sans-serif"
                font-weight="900"
                font-size="7.5"
                text-anchor="middle"
                letter-spacing="-0.3"
              >
                L.point
              </text>
            </svg>
            라이온 포인트
          </button>

          <button
            type="button"
            class="quickpay"
            aria-pressed="false"
            aria-label="최종 결제 수단 간편 결제 선택"
          >
            <!-- 간편 결제 -->
            <svg
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M17 13V7C17 5.89543 16.1046 5 15 5H4C2.89543 5 2 5.89543 2 7V17C2 18.1046 2.89543 19 4 19H12"
                stroke="black"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <line x1="2" y1="9" x2="17" y2="9" stroke="black" stroke-width="1.5" />
              <circle cx="18" cy="18" r="5.2" stroke="black" stroke-width="1.5" fill="white" />
              <path
                d="M15.5 20V16L18 18.5L20.5 16V20"
                stroke="black"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            간편 결제
          </button>

          <button
            type="button"
            class="lionpay"
            aria-pressed="false"
            aria-label="최종 결제 수단 라이온 페이 선택"
          >
            <!-- 라이온 페이 -->
            <svg
              width="80"
              height="40"
              viewBox="0 0 80 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <defs>
                <linearGradient id="lionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="rgb(255, 120, 40)" />
                  <stop offset="50%" stop-color="rgb(255, 96, 0)" />
                  <stop offset="100%" stop-color="rgb(204, 77, 0)" />
                </linearGradient>
              </defs>
              <g fill="url(#lionGradient)" transform="translate(-4, 0)">
                <path d="M8 12L16 12L12 16L8 12Z" />
                <path d="M18 12L26 12L22 16L18 12Z" />
                <path d="M12 16V28H24V24H16V16H12Z" />
              </g>

              <!-- "Lion" 텍스트: 아이콘 형태에 맞춰 x좌표만 최적화 -->
              <text
                x="28"
                y="27"
                fill="url(#lionGradient)"
                font-family="Arial, sans-serif"
                font-weight="900"
                font-size="18"
                letter-spacing="-0.5"
              >
                Lion
              </text>
            </svg>
            라이온 페이
          </button>

          <button
            type="button"
            class="cellphone-pay"
            aria-pressed="false"
            aria-label="최종 수단 결제 휴대폰 선택"
          >
            <!-- 휴대폰 -->
            <svg
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <rect x="6" y="2" width="12" height="20" rx="2" stroke="black" stroke-width="1.5" />
              <line
                x1="10"
                y1="4"
                x2="14"
                y2="4"
                stroke="black"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <circle cx="12" cy="19" r="1.5" stroke="black" stroke-width="1.5" />
            </svg>

            휴대폰
          </button>

          <button
            type="button"
            class="bank-payment"
            aria-pressed="false"
            aria-label="최종 결제 수단 통장 결제 선택"
          >
            <!-- 통장 결제 -->
            <svg
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M16 13V6C16 4.89543 15.1046 4 14 4H4C2.89543 4 2 4.89543 2 6V13"
                stroke="black"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <path
                d="M1 16L3 13H15L17 16"
                stroke="black"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path d="M1 16H13" stroke="black" stroke-width="1.5" stroke-linecap="round" />
              <circle cx="18" cy="18" r="5.2" stroke="black" stroke-width="1.5" fill="white" />
              <path
                d="M15.5 20V16L18 18.5L20.5 16V20"
                stroke="black"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            통장 결제
          </button>
        </div>
      </section>

      <section class="earn-points">
        <h2 class="sr-only">포인트 적립 방법</h2>
        <div class="earn-lionpoint">
          <label for="earn-point">라이온 포인트 적립</label>
          <input type="checkbox" name="point-data" id="earn-point" checked />
        </div>
        <div class="earn-point-etc">
          <label for="id-point">ID적립</label>
          <input type="checkbox" name="id-point-data" id="id-point" />
          <label for="card-number-point">카드번호 적립</label>
          <input type="checkbox" name="card-point-data" id="card-number-point" />
        </div>
      </section>
    </main>
    <footer class="container final-payment-calculation">
      <div class="tickect-price-cal-container">
        <p class="ticket-price">
          상품금액 <strong class="js-component-price">1000</strong>원 - 할인금액
          <strong class="js-component-price">200</strong>원
        </p>
        <p class="total-ticket-price js-component-price" aria-live="polite">
          <strong>총 합계</strong> 800 원
        </p>
      </div>
      <button
        type="button"
        class="pay-button"
        aria-pressed="false"
        aria-label="최종 결제 금액 결제 버튼"
      >
        결제하기
      </button>
    </footer>
  </body>
</html>
