<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="예매의 정석 사이트 결제 페이지" />
    <title>영화 티켓 결제 페이지</title>
    <link rel="stylesheet" href="/src/style/index.css" />
    <link rel="stylesheet" href="/src/page/payment/paymentComponent.css" />
  </head>
  <body>
    <h1 class="sr-only">영화 예매 티켓 결제 페이지</h1>
    <a href="#main-content" class="sr-only focusable-main">본문 바로가기</a>
    <main class="app">
      <div class="container paymenent-container">
        <section class="movie-ticket-payment-info">
          <h2 class="sr-only">영화 예매 티켓 정보</h2>
          <div class="img-container">
            <img
              class="movie-img"
              width="100"
              height="130"
              src="/src/page/payment/dummyImg.jpg"
              alt="/"
            />
            <svg
              class="movie-age-rating"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 64 64"
              width="25"
              height="25"
            >
              <rect x="8" y="8" width="48" height="48" rx="6" fill="#E8844D" />
              <text
                x="32"
                y="36"
                font-family="Arial, sans-serif"
                font-size="44"
                font-weight="bold"
                fill="white"
                text-anchor="middle"
                dominant-baseline="middle"
              >
                15
              </text>
            </svg>
          </div>
          <div class="info-text-part">
            <p class="movie-title">이터널 선샤인</p>
            <ul class="js-component movie-info">
              <li>2026-02-10 (화) 21:15 ~ 23:12</li>
              <li>건대입구 7관, 수퍼LED(일반) - 2D</li>
              <li><strong>성인1</strong></li>
            </ul>
          </div>
        </section>
        <section>
          <h2>할인/포인트</h2>
        </section>
        <section>
          <h2>최종 결제수단</h2>
        </section>
      </div>
    </main>
  </body>
</html>
