<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/style/index.css" />
    <link rel="stylesheet" href="/src/page/booking/booking.css" />

    <script type="module" src="/src/page/booking/booking.js" defer></script>

    <title>예매의 정석 | 상영 시간 선택</title>
  </head>

  <!-- ❌ 영화관 종류(전체/스페셜관), 극장 추가 버튼, 극장 선택 네이게이션 구현 ❌ -->
  <body class="app">
    <!-- 날짜 선택 -->
    <main class="container">
      <section class="date-container" aria-label="날짜 선택">
        <!-- TODO: 줄바꿈, 글자 사이즈, 컬러(평일/공휴일), 가로 스크롤 -->
        <button>
          <strong>10</strong>
          <span class="play-week">오늘</span>
        </button>
        <button>
          <strong>11</strong>
          <span class="play-week">내일</span>
        </button>
        <button>
          <strong>12</strong>
          <span class="play-week">목</span>
        </button>
        <button>
          <strong>13</strong>
          <span class="play-week">금</span>
        </button>
        <button>
          <span class="saturday">
            <strong>14</strong>
            <span class="play-week">토</span>
          </span>
        </button>
        <button>
          <span class="sunday">
            <strong>15</strong>
            <span class="play-week">일</span>
          </span>
        </button>
        <button>
          <strong>16</strong>
          <span class="play-week">월</span>
        </button>
        <button>
          <strong>17</strong>
          <span class="play-week">화</span>
        </button>
        <button>
          <strong>18</strong>
          <span class="play-week">수</span>
        </button>
      </section>
      <!-- 영화 카드 + 상영시간 -->
      <section class="movie-list" aria-label="영화 목록">
        <!-- TODO: js get fetch로 이미지 경로 및 영화 상세 내역 받기 -->
        <span class="loader"></span>
      </section>
    </main>
  </body>
</html>
