<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/style/index.css" />
    <link rel="stylesheet" href="/src/page/booking/booking.css" />

    <script type="module" src="/src/page/booking/booking.js" defer></script>

    <title>예매의 정석 | 상영 시간 선택</title>
  </head>

  <!-- ❌ 영화관 종류(전체/스페셜관), 극장 추가 버튼, 극장 선택 네이게이션 구현 ❌ -->
  <body class="app">
    <!-- 날짜 선택 -->
    <main class="container">
      <section class="region-container" aria-label="영화관 선택">
        <button id="openRegion">영화관 선택</button>
      </section>
      <section class="date-container" aria-label="날짜 선택">
        <button>
          <strong>10</strong>
          <span class="play-week">오늘</span>
        </button>
        <button>
          <strong>11</strong>
          <span class="play-week">내일</span>
        </button>
        <button>
          <strong>12</strong>
          <span class="play-week">목</span>
        </button>
        <button>
          <strong>13</strong>
          <span class="play-week">금</span>
        </button>
        <button class="saturday">
          <span>
            <strong>14</strong>
            <span class="play-week">토</span>
          </span>
        </button>
        <button class="sunday">
          <span>
            <strong>15</strong>
            <span class="play-week">일</span>
          </span>
        </button>
        <button>
          <strong>16</strong>
          <span class="play-week">월</span>
        </button>
        <button>
          <strong>17</strong>
          <span class="play-week">화</span>
        </button>
        <button>
          <strong>18</strong>
          <span class="play-week">수</span>
        </button>
      </section>
      <!-- 영화 카드 + 상영시간 -->
      <section class="movie-list" aria-label="영화 목록">
        <span class="loader"></span>
      </section>
    </main>
    <section id="theaterSheet">
      <header class="sheet-header">
        <span class="sheet-title">영화관 선택</span>
        <button id="closeSheet">X</button>
      </header>
      <div class="bottom-container">
        <div>
          <ul id="regionList">
            <li><button>서울</button></li>
            <li><button>경기</button></li>
          </ul>
        </div>
        <div>
          <ul id="theaterList"></ul>
        </div>
      </div>
    </section>
  </body>
</html>
