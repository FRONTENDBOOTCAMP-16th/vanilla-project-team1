<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./booking.css" />
    <link rel="stylesheet" href="../../style/index.css" />
    <script src="./booking.js" defer></script>

    <title>예매의 정석 | 상영 시간 선택</title>
  </head>

  <!-- ❌ 영화관 종류(전체/스페셜관), 극장 추가 버튼, 극장 선택 네이게이션 구현 ❌ -->
  <body>
    <!-- 날짜 선택 -->
    <section class="date" aria-label="날짜 선택">
      <!-- TODO: 줄바꿈, 글자 사이즈, 컬러(평일/공휴일), 가로 스크롤 -->
      <button>
        <strong>10</strong>
        <span class="play-week">오늘</span>
      </button>
      <button>
        <strong>11</strong>
        <span class="play-week">내일</span>
      </button>
      <button>
        <strong>12</strong>
        <span class="play-week">목</span>
      </button>
      <button>
        <strong>13</strong>
        <span class="play-week">금</span>
      </button>
      <button>
        <strong>14</strong>
        <span class="play-week">토</span>
      </button>
      <button>
        <strong>15</strong>
        <span class="play-week">일</span>
      </button>
      <button>
        <strong>16</strong>
        <span class="play-week">월</span>
      </button>
    </section>
    <!-- 영화 카드 + 상영시간 -->
    <section class="movie-list" aria-label="영화 목록">
      <!-- TODO: js get fetch로 이미지 경로 및 영화 상세 내역 받기 -->
      <article class="movie-card">
        <img src="/src/assets/images/team_logo.png" alt="왕과 사는 남자" width="100" height="150" />
        <div class="showtime-list">
          <button class="show-time">
            <span class="hall">1관</span>
            <strong>09:00</strong>~11:00
            <span class="seats">100/250</span>
            <span class="format">2D</span>
          </button>
          <button class="show-time">
            <span class="hall">2관</span>
            <strong>12:00</strong>~14:00
            <span class="seats">100/250</span>
            <span class="format">3D</span>
          </button>
          <button class="show-time">
            <span class="hall">3관</span>
            <strong>15:00</strong>~17:00
            <span class="seats">100/250</span>
            <span class="format">4D</span>
          </button>
        </div>
      </article>

        <img src="/src/assets/images/team_logo.png" alt="왕과 사는 남자" width="100" height="150" />

            <span class="seats">100/250</span>
            <span class="format">3D</span>
          </button>
          <button class="show-time">
            <span class="hall">3관</span>
            <strong>15:00</strong>~17:00
            <span class="seats">100/250</span>
            <span class="format">4D</span>
          </button>
        </div>
        </div>
      </article>
      <article class="movie-card">
        <img src="/src/assets/images/team_logo.png" alt="왕과 사는 남자" width="100" height="150" />
        <div class="showtime-list">
          <button class="show-time">
            <span class="hall">1관</span>

          </button>

            <span class="hall">2관</span>

            <span class="seats">100/250</span>
            <span class="format">3D</span>
          </button>

            <span class="hall">3관</span>
            <strong>15:00</strong>~17:00
            <span class="seats">100/250</span>
            <span class="format">4D</span>
          </button>
        </div>
        </div>
      </article>
    </section>
  </body>
</html>
